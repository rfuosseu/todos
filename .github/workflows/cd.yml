name: Deployment Continu

on: 
  release:
    types: [published]  # Se déclenche à la publication d'une release
  workflow_dispatch:  # Permet de déclencher manuellement le workflow depuis l'interface GitHub


jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build and deploy
        run: echo "Build et déploiement à implémenter"  # Placeholder pour les étapes de build et déploiement à venir

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to production
        run: echo "Déploiement en production à implémenter"  # Placeholder pour les étapes de déploiement en production à venir