name: Intégration Continue

on:
  push:               # À chaque fois que quelqu'un fait git push
    branches: [ "main" ]  # Seulement sur la branche main
  pull_request:       # À chaque fois qu'une Pull Request est ouverte/mise à jour
    branches: [ "main" ]  # Vers la branche main

jobs: 
  Lint:          # Nom du job
    runs-on: ubuntu-latest  # OS sur lequel le job s'exécute

    steps:              # Étapes du job
      - name: Checkout code
        uses: actions/checkout@v6  # Action pour récupérer le code du repo

      - name: Set up Python
        uses: actions/setup-python@v4  # Action pour configurer Python
        with:
          python-version: '3.9'  # Version de Python à utiliser

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt  # Installer les dépendances

      - name: Run linter
        run: ruff check .  # Lancer le linter sur tout le code

  Test:
    runs-on: ubuntu-latest

    steps:
      - name: test
        run: echo "Tests à implémenter"  # Placeholder pour les tests à venir
      - name: ECHO VIBRA_AZURE_TOKEN
        run: echo "$VIBRA_AZURE_TOKEN"  # Placeholder pour les tests à venir, à remplacer par la commande de test réelle

      - name: bracnhe actuelle
        run: echo "$GITHUB_REF"  # Affiche la branche actuelle pour le debug